<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Servio Output</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
        <style>
            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                background: #111318;
                color: #e6e1e5;
                font-family: "Google Sans", "Roboto", "Helvetica", "Arial", sans-serif;
            }

            .shell {
                display: flex;
                min-height: 100vh;
                flex-direction: column;
            }

            .toolbar {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 16px;
                background: #1a1d24;
                border-bottom: 1px solid #2d3038;
            }

            .title {
                min-width: 0;
                flex: 1;
            }

            .alias {
                overflow: hidden;
                color: #ffffff;
                font-size: 16px;
                font-weight: 600;
                line-height: 1.2;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .meta {
                margin-top: 2px;
                color: #938f99;
                font-size: 12px;
            }

            .controls {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            label {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                color: #cac4d0;
                font-size: 12px;
                user-select: none;
            }

            button {
                border: 1px solid #49454f;
                border-radius: 8px;
                background: transparent;
                color: #e6e1e5;
                cursor: pointer;
                font: inherit;
                font-size: 12px;
                padding: 7px 12px;
            }

            button:hover {
                background: #2d3038;
            }

            .terminal {
                flex: 1;
                overflow: auto;
                padding: 14px 16px;
                font-family: "JetBrains Mono", "Fira Code", Monaco, monospace;
                font-size: 12.5px;
                line-height: 1.55;
                tab-size: 2;
            }

            .terminal::-webkit-scrollbar {
                width: 10px;
            }

            .terminal::-webkit-scrollbar-track {
                background: transparent;
            }

            .terminal::-webkit-scrollbar-thumb {
                background: #49454f;
                border-radius: 5px;
            }

            .empty {
                color: #938f99;
                font-style: italic;
            }

            .line {
                display: flex;
                gap: 12px;
                min-height: 18px;
                color: #e6e1e5;
                white-space: pre-wrap;
                overflow-wrap: anywhere;
                word-break: normal;
            }

            .line.error {
                color: #f2b8b5;
            }

            .timestamp {
                flex: 0 0 74px;
                color: #938f99;
                font-size: 10.5px;
                user-select: none;
            }

            .text {
                min-width: 0;
                flex: 1;
            }
        </style>
    </head>

    <body>
        <div class="shell">
            <header class="toolbar">
                <div class="title">
                    <div id="alias" class="alias">Output</div>
                    <div id="meta" class="meta">0 lines</div>
                </div>
                <div class="controls">
                    <label>
                        <input id="autoScroll" type="checkbox" checked />
                        Auto-scroll
                    </label>
                    <button id="clear" type="button">Clear</button>
                </div>
            </header>
            <main id="terminal" class="terminal">
                <div class="empty">No output yet. Start the process to see logs here.</div>
            </main>
        </div>
        <script src="./terminal-window.js"></script>
    </body>

</html>
