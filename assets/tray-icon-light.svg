<svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Tray icon for light menu bar (dark icon) -->
  <!-- Terminal outline -->
  <rect x="2" y="4" width="18" height="14" rx="2" stroke="#1D1B20" stroke-width="1.5" fill="none"/>
  
  <!-- Terminal header line -->
  <line x1="2" y1="7" x2="20" y2="7" stroke="#1D1B20" stroke-width="1"/>
  
  <!-- Window dots -->
  <circle cx="5" cy="5.5" r="0.75" fill="#1D1B20"/>
  <circle cx="7.5" cy="5.5" r="0.75" fill="#1D1B20"/>
  <circle cx="10" cy="5.5" r="0.75" fill="#1D1B20"/>
  
  <!-- Prompt lines -->
  <rect x="4" y="10" width="2" height="1" rx="0.5" fill="#1D1B20"/>
  <rect x="7" y="10" width="8" height="1" rx="0.5" fill="#1D1B20" opacity="0.6"/>
  
  <rect x="4" y="13" width="2" height="1" rx="0.5" fill="#1D1B20"/>
  <rect x="7" y="13" width="6" height="1" rx="0.5" fill="#1D1B20" opacity="0.6"/>
  
  <!-- Cursor -->
  <rect x="4" y="16" width="2" height="1" rx="0.5" fill="#1D1B20"/>
  <rect x="7" y="15.5" width="1.5" height="2" rx="0.5" fill="#1D1B20"/>
</svg>
